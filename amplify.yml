version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd client
        - npm ci
    build:
      commands:
        - npm run build
        # Ensure _redirects is copied to dist
        - cp public/_redirects dist/_redirects 2>/dev/null || echo "Warning: _redirects not found in public/"
        # Verify _redirects file exists in dist
        - ls -la dist/ | grep _redirects || echo "ERROR: _redirects not in dist!"
        - echo "=== Contents of _redirects ==="
        - cat dist/_redirects 2>/dev/null || echo "ERROR: Cannot read _redirects"
        - echo "=== End of _redirects ==="
  artifacts:
    baseDirectory: client/dist
    files:
      - '**/*'
  cache:
    paths:
      - client/node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: 'Cache-Control'
          value: 'public, max-age=31536000, immutable'
    - pattern: '*.html'
      headers:
        - key: 'Cache-Control'
          value: 'no-cache'
