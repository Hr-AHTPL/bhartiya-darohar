version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd client
        - npm ci
    build:
      commands:
        - npm run build
        - if [ -f public/_redirects ]; then cp public/_redirects dist/_redirects; fi
        - ls -la dist/
        - echo "=== Checking for _redirects ==="
        - if [ -f dist/_redirects ]; then echo "SUCCESS - _redirects found"; cat dist/_redirects; else echo "ERROR - _redirects NOT found"; fi
  artifacts:
    baseDirectory: client/dist
    files:
      - '**/*'
  cache:
    paths:
      - client/node_modules/**/*
